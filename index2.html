<!DOCTYPE html> <!-- Documento segue padrão HTML5 -->
<html lang="pt-BR"> <!-- Idioma definido como português do Brasil -->
<head>
  <meta charset="UTF-8"> <!-- Permite acentos e caracteres especiais -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsivo -->
  <title>Guia do IF - Calendário</title> <!-- Título da aba -->
  <link rel="stylesheet" href="styles.css"> <!-- Conecta CSS -->
</head>

<body>
  <!-- Cabeçalho fixo com título e menu -->
  <header>
    <div class="container">
      <h1>Guia do IF</h1>
      <nav>
        <ul>
          <li><a href="index.html">Início</a></li>
          <li><a href="index2.html" class="ativo">Calendário</a></li> <!-- Página atual -->
          <li><a href="index3.html">Professores</a></li>
          <li><a href="index4.html">Biblioteca</a></li>
          <li><a href="index5.html">FAQ</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Conteúdo principal -->
  <main>
    <div class="container">
      <!-- Seção de introdução -->
      <section>
        <h2>Calendário Acadêmico</h2>
        <p>Selecione o seu curso e semestre para ver a grade de horários das aulas.</p>

        <!-- Formulário para escolher curso e semestre -->
        <form id="formulario-calendario">
          <div class="grid-2">
            <div class="form-group">
              <label for="curso">Escolha o Curso</label>
              <select id="curso">
                <option value="">-- Selecione um curso --</option>
                <option value="analise">Análise de Sistemas</option>
              </select>
            </div>
            <div class="form-group">
              <label for="semestre">Escolha o Semestre</label>
              <select id="semestre" disabled> <!-- começa desabilitado -->
                <option value="">-- Selecione o semestre --</option>
              </select>
            </div>
          </div>
        </form>
      </section>

      <!-- Seção da tabela de horários (inicialmente escondida) -->
      <section id="secao-tabela" style="display: none;">
        <h2>Sua Grade de Horários</h2>
        <table id="tabela-horarios">
          <thead>
            <tr>
              <th>Dia</th>
              <th>Horário</th>
              <th>Disciplina</th>
              <th>Professor</th>
            </tr>
          </thead>
          <tbody id="corpo-tabela">
            <!-- Aqui o JS insere as aulas dinamicamente -->
          </tbody>
        </table>
      </section>
    </div>
  </main>
  
  <!-- Rodapé fixo -->
  <footer style="position: fixed;">
    <div class="container">
      <p>&copy; 2026 Guia do IF. Calendário acadêmico.</p>
    </div>
  </footer>

  <!-- Plugin VLibras para acessibilidade -->
  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div vw-plugin-top-wrapper></div>
    </div>
  </div>
  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>
    new window.VLibras.Widget("https://vlibras.gov.br/app"); <!-- Inicializa VLibras -->
  </script>

  <!-- Script principal que controla calendário -->
  <script src="calendario&sac.js"></script>
</body>
</html>
